<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join This Vibrant Community</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="hero-login">
    <h2>Join Us</h2>
    <h4>Be A Part Of This Incredible Community</h4>

    <form class="login-form" action="#" method="POST">

        <div class="input-group">
            <label for="name">Name</label>
            <input type="text" id="name" required minlength="3" placeholder="Name">
        </div>

        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" required minlength="3" placeholder="Email">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" required
                   pattern="^(?=.*[0-9])(?=.*[A-Z]).{8,}$"
                   title="Min 8 chars, 1 uppercase, 1 number" placeholder="Password">
        </div>

        <div class="input-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" required placeholder="Confirm Password">
        </div>

        <button type="submit" id="register"><a href="index.html" id="register-link">Register</a></button>

    </form>
</div>
</body>
</html>
